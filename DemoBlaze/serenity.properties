# Configuración del Driver
webdriver.driver=chrome
# Recomiendo usar autodownload en lugar de una ruta fija al .exe
webdriver.autodownload=true
# Si prefieres usar tu propio exe, asegúrate de que la ruta sea correcta:
# webdriver.chrome.driver=src/test/resources/webdriver/windows/chromedriver.exe
# Opciones de Chrome (actualizadas para Selenium 4)
chrome.switches=--incognito;--enable-automation;--no-sandbox;--disable-gpu-sandbox;--remote-allow-origins=*
# Preferencias del navegador
chrome_preferences.safebrowsing.enabled=false
serenity.browser.maximized=true
# Tiempos de espera (en milisegundos para mayor precisión en Serenity)
webdriver.timeouts.implicitlywait=10000
webdriver.wait.for.timeout=5000
# Codificación para evitar problemas con tildes y eńes
feature.file.encoding=UTF-8
serenity.report.encoding=UTF-8
# Nivel de detalle del reporte
serenity.logging=VERBOSE
serenity.console.colors=true